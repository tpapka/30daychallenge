<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>30 Day Challenge Tracker</title>
  <style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #f0f2f5;
  margin: 0;
  padding: 12px;
  color: #333;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  overflow: hidden;
}

.header {
  background: #9a0f2e;
  color: white;
  padding: 18px 14px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 1.6rem;
}

.screen {
  padding: 16px;
  display: none;
}

.active {
  display: block;
}

/* Buttons */

.choice-btn {
  display: block;
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 1.1rem;
  font-weight: 600;
  background: #9a0f2e;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  touch-action: manipulation;
}

.choice-btn:active {
  transform: scale(.98);
}

.back-btn {
  background: #6c757d;
}

/* Day headers */

.day-header {
  display: flex;
  align-items: center;
  padding: 16px;
  background: #f8f9fa;
  border-radius: 8px;
  margin: 8px 0;
  user-select: none;
}

.day-header.completed {
  background: #e8f5e9;
  text-decoration: line-through;
  color: #555;
}

.day-title {
  font-weight: bold;
  font-size: 1.1rem;
  flex: 1;
}

/* Bigger checkbox for mobile */

input[type="checkbox"] {
  transform: scale(1.5);
  margin-right: 12px;
  accent-color: #28a745;
}

/* Day content */

.day-content {
  display: none;
  padding: 12px;
  background: #fff;
  border-radius: 0 0 8px 8px;
  border: 1px solid #e9ecef;
  border-top: none;
}

.day-content.open {
  display: block;
}

/* Table improvements */

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
  margin-top: 8px;
}

th, td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid #ddd;
}

th {
  background: #e9ecef;
}

/* Timer */

.timer-area {
  margin-top: 14px;
  padding: 14px;
  background: #e9f5ff;
  border-radius: 10px;
  text-align: center;
}

.timer-display {
  font-size: clamp(2rem, 8vw, 3rem);
  font-weight: bold;
  margin: 10px 0;
  letter-spacing: 2px;
  color: #2c3e50;
}

.start-btn {
  padding: 14px 22px;
  font-size: 1.1rem;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 8px;
}

.start-btn:disabled {
  background: #95d5a2;
}

/* Mobile tweaks */

@media (max-width: 480px) {

  body {
    padding: 8px;
  }

  h1 {
    font-size: 1.4rem;
  }

  .screen {
    padding: 14px;
  }

  table {
    font-size: 0.9rem;
  }

  .choice-btn {
    font-size: 1rem;
    padding: 15px;
  }

}

/* Safe area for iPhone */

body {
  padding-bottom: env(safe-area-inset-bottom);
}
</style>
</head>
<body>

<div class="container">

  <div id="choice-screen" class="screen active">
    <div class="header">
      <h1>30 Day Challenge</h1>
    </div>
    <div style="padding: 30px;">
      <button class="choice-btn" data-challenge="abs">Abs Challenge</button>
      <button class="choice-btn" data-challenge="butt">Butt Challenge</button>
    </div>
  </div>

  <div id="challenge-screen" class="screen">
    <div class="header">
      <h1 id="title"></h1>
    </div>
    <div style="padding: 20px;">
      <button class="choice-btn back-btn">← Back to selection</button>
      <div id="days-list"></div>
    </div>
  </div>

</div>

<script>
const choiceScreen    = document.getElementById('choice-screen');
const challengeScreen = document.getElementById('challenge-screen');
const titleEl         = document.getElementById('title');
const daysList        = document.getElementById('days-list');

let currentChallenge = '';
let plankInterval    = null;

const absPlan = [
  [15, 5, 5, 10], [20, 8, 8, 12], [25, 10, 10, 15],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [30, 12, 12, 20], [35, 15, 15, 25], [40, 20, 20, 30],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [40, 30, 30, 35], [50, 50, 30, 38], [55, 65, 33, 42],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [60, 75, 40, 50], [65, 85, 42, 55], [70, 90, 42, 60],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [75, 100, 45, 65], [80, 110, 48, 70], [85, 120, 50, 75],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [90, 130, 52, 80], [95, 140, 55, 85], [100, 150, 58, 90],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [105, 160, 60, 95], [110, 170, 60, 100], [115, 180, 62, 110],
  "Today is Rest. Take your time off and enjoy your daily routine. Have a good day.",
  [120, 190, 62, 115], [125, 200, 65, 120]
];

const buttPlan = [
  [15, 5, 10], [20, 5, 10], [20, 10, 15], [25, 10, 15], [30, 10, 20],
  [30, 15, 20], [35, 15, 20], [35, 20, 25], [35, 20, 25], [40, 20, 30],
  [40, 25, 30], [45, 25, 30], [45, 30, 35], [50, 30, 35], [50, 30, 40],
  [55, 35, 40], [55, 35, 40], [55, 40, 45], [60, 40, 45], [60, 40, 50],
  [65, 45, 50], [65, 45, 50], [65, 50, 55], [70, 50, 55], [70, 50, 60],
  [70, 55, 60], [75, 55, 65], [75, 60, 65], [80, 60, 70], [90, 60, 70]
];

document.querySelectorAll('[data-challenge]').forEach(btn => {
  btn.addEventListener('click', () => {
    currentChallenge = btn.dataset.challenge;
    titleEl.textContent = currentChallenge.charAt(0).toUpperCase() + currentChallenge.slice(1) + ' Challenge';

    choiceScreen.classList.remove('active');
    challengeScreen.classList.add('active');

    if (plankInterval) clearInterval(plankInterval);
    loadDays();
  });
});

document.querySelector('.back-btn').addEventListener('click', () => {
  if (plankInterval) clearInterval(plankInterval);
  challengeScreen.classList.remove('active');
  choiceScreen.classList.add('active');
});

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function startPlankTimer(display, startBtn) {
  if (display.dataset.running === 'true') return;

  let remaining = parseInt(display.dataset.remaining, 10);
  if (remaining <= 0) return;

  display.dataset.running = 'true';
  startBtn.disabled = true;
  display.textContent = formatTime(remaining);

  plankInterval = setInterval(() => {
    remaining--;
    display.dataset.remaining = remaining;
    display.textContent = formatTime(remaining);

    if (remaining <= 0) {
      clearInterval(plankInterval);
      display.dataset.running = 'false';
      startBtn.disabled = false;
      display.style.color = '#28a745'; // green when finished
    }
  }, 1000);
}

function resetPlankTimerForDay(display, target) {
  if (plankInterval) clearInterval(plankInterval);
  display.dataset.remaining = target;
  display.dataset.running = 'false';
  display.textContent = formatTime(target);
  display.style.color = '#2c3e50';
}

function loadDays() {
  daysList.innerHTML = '';

  const plan = currentChallenge === 'abs' ? absPlan : buttPlan;
  const exercises = currentChallenge === 'abs'
    ? ['Sit Up', 'Crunch', 'Leg Raise', 'Plank']
    : ['Squat', 'Hip Bridge', 'Lunge'];

  for (let day = 1; day <= 30; day++) {
    const key = `${currentChallenge}_day_${day}`;
    const isDone = localStorage.getItem(key) === 'true';

    const dayDiv = document.createElement('div');

    const header = document.createElement('div');
    header.className = 'day-header' + (isDone ? ' completed' : '');
    header.innerHTML = `
      <input type="checkbox" ${isDone ? 'checked' : ''}>
      <span class="day-title">Day ${day}</span>
    `;

    const content = document.createElement('div');
    content.className = 'day-content';

    const dayData = plan[day - 1];
    let html = '';

    if (typeof dayData === 'string') {
      html = `<div style="padding:12px; background:#fff3cd; border-radius:6px; color:#856404;">${dayData}</div>`;
    } else {
      html = `
        <table>
          <thead>
            <tr>
              <th>Exercise</th>
              <th>Target</th>
            </tr>
          </thead>
          <tbody>
      `;

      dayData.forEach((val, i) => {
        const isPlank = currentChallenge === 'abs' && i === 3;
        const displayVal = isPlank ? `Hold → (${val} sec)` : `${val}`;
        const rowStyle = isPlank ? 'cursor:pointer; background:#f0f8ff; font-weight:500;' : '';

        html += `
          <tr style="${rowStyle}">
            <td>${exercises[i]}</td>
            <td>${displayVal}</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;

      if (currentChallenge === 'abs') {
        const plankSec = dayData[3];
        html += `
          <div class="timer-area" style="display:none;">
            <div class="target-time">Target: ${plankSec} seconds</div>
            <div class="timer-display" 
                 id="plank-display-${day}" 
                 data-target="${plankSec}" 
                 data-remaining="${plankSec}" 
                 data-running="false">
              ${formatTime(plankSec)}
            </div>
            <button class="start-btn" id="plank-start-${day}">Start Countdown</button>
          </div>
        `;
      }
    }

    content.innerHTML = html;

    // Toggle day content
    header.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT') return;

      const wasOpen = content.classList.contains('open');
      document.querySelectorAll('.day-content.open').forEach(el => el.classList.remove('open'));

      if (!wasOpen) {
        content.classList.add('open');

        // Reset timer when opening the day
        if (currentChallenge === 'abs' && typeof dayData !== 'string') {
          const display = content.querySelector(`#plank-display-${day}`);
          const target = parseInt(display.dataset.target, 10);
          resetPlankTimerForDay(display, target);

          const startBtn = content.querySelector(`#plank-start-${day}`);
          if (startBtn) startBtn.disabled = false;
        }
      }
    });

    // Checkbox
    header.querySelector('input').addEventListener('change', e => {
      localStorage.setItem(key, e.target.checked);
      header.classList.toggle('completed', e.target.checked);
    });

    // Plank timer logic (only for abs workout days)
    if (currentChallenge === 'abs' && typeof dayData !== 'string') {
      content.addEventListener('click', e => {
        const tr = e.target.closest('tr');
        if (tr && tr.cells[0].textContent === 'Plank') {
          const area = content.querySelector('.timer-area');
          if (area) {
            area.style.display = area.style.display === 'none' ? 'block' : 'none';
          }
        }
      });

      const startBtn = content.querySelector(`#plank-start-${day}`);
      const display  = content.querySelector(`#plank-display-${day}`);

      if (startBtn && display) {
        startBtn.onclick = () => startPlankTimer(display, startBtn);
      }
    }

    dayDiv.appendChild(header);
    dayDiv.appendChild(content);
    daysList.appendChild(dayDiv);
  }
}
</script>
</body>
</html>
